<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Ingreso - PintuMaster</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: #f5f5f5;
        color: #1a1a1a;
      }

      .header {
        background: #1a1a1a;
        color: #ffffff;
        padding: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .back-btn {
        background: none;
        border: none;
        color: #ffffff;
        font-size: 24px;
        cursor: pointer;
      }

      .main {
        padding: 24px;
        max-width: 600px;
        margin: 0 auto;
        padding-bottom: 120px;
      }

      .page-title {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 24px;
      }

      .section {
        background: #ffffff;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .section-title {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 2px solid #cc0000;
      }

      .form-group {
        margin-bottom: 16px;
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #1a1a1a;
      }

      input[type="text"],
      input[type="email"],
      input[type="tel"],
      input[type="number"],
      input[type="date"],
      input[type="time"],
      select,
      textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-family: "Poppins", sans-serif;
        font-size: 14px;
        transition: all 0.2s;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: #cc0000;
        box-shadow: 0 0 0 3px rgba(204, 0, 0, 0.1);
      }

      .form-group.required label::after {
        content: " *";
        color: #cc0000;
      }

      .radio-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .radio-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      input[type="radio"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .radio-item label {
        margin: 0;
        font-weight: 400;
        cursor: pointer;
      }

      .form-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
      }

      .help-text {
        font-size: 12px;
        color: #999;
        margin-top: 4px;
      }

      .form-actions {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        position: fixed;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: #ffffff;
        padding: 16px;
        border-radius: 8px;
        box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.1);
        z-index: 100;
      }

      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        font-size: 14px;
        font-family: "Poppins", sans-serif;
        cursor: pointer;
        transition: all 0.2s;
        min-height: 40px;
      }

      .btn-primary {
        background: #cc0000;
        color: #ffffff;
        flex: 1;
      }

      .btn-primary:hover {
        background: #aa0000;
      }

      .btn-secondary {
        background: #f5f5f5;
        color: #1a1a1a;
        border: 1px solid #ddd;
      }

      .btn-secondary:hover {
        border-color: #cc0000;
      }

      /* ==================== RESPONSIVE ==================== */
      /* Extra Small (320px - 425px) */
      @media (max-width: 425px) {
        .main {
          padding: 12px;
          padding-bottom: 120px;
        }

        .form-group {
          margin-bottom: 14px;
        }

        label {
          font-size: 14px;
        }

        input,
        select,
        textarea {
          min-height: 48px;
          padding: 12px;
          font-size: 16px;
        }

        .form-actions {
          position: static;
          flex-direction: column-reverse;
          gap: 8px;
        }

        .btn {
          min-height: 48px;
        }

        .btn-primary {
          flex: unset;
        }

        .form-row {
          grid-template-columns: 1fr;
        }
      }

      /* Small (425px - 768px) */
      @media (min-width: 426px) and (max-width: 768px) {
        .main {
          padding: 16px;
          padding-bottom: 100px;
        }

        input,
        select,
        textarea {
          min-height: 44px;
        }

        .form-actions {
          position: static;
          flex-direction: column-reverse;
        }

        .btn-primary {
          flex: unset;
        }

        .form-row {
          grid-template-columns: 1fr;
        }
      }

      /* Large (1024px+) */
      @media (min-width: 1025px) {
        .main {
          max-width: 600px;
          margin: 0 auto;
        }
      }

      /* Extra Large (2560px+) */
      @media (min-width: 2560px) {
        .main {
          max-width: 800px;
          margin: 0 auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <button class="back-btn">← Volver</button>
      <h1 style="font-size: 18px; font-weight: 600">Nuevo Ingreso</h1>
      <div style="width: 40px"></div>
    </div>

    <div class="main">
      <div class="page-title">Registrar Ingreso</div>

      <form id="ingresoForm">
        <!-- INFORMACIÓN BÁSICA -->
        <div class="section">
          <div class="section-title">Información Básica</div>

          <div class="form-group required">
            <label>Tipo de Ingreso</label>
            <div class="radio-group">
              <div class="radio-item">
                <input
                  type="radio"
                  id="trabajo"
                  name="tipoIngreso"
                  value="Trabajo"
                  checked
                />
                <label for="trabajo">Pago por Trabajo</label>
              </div>
              <div class="radio-item">
                <input type="radio" id="otro" name="tipoIngreso" value="Otro" />
                <label for="otro">Otro Ingreso</label>
              </div>
            </div>
          </div>

          <div
            class="form-group required"
            id="trabajoSelect"
            style="display: block"
          >
            <label for="trabajo-id">Selecciona un Trabajo</label>
            <select id="trabajo-id" name="trabajo-id">
              <option value="">-- Selecciona --</option>
              <option value="ABC-123">
                ABC-123 - Juan Pérez (Latonería) - $450.000
              </option>
              <option value="XYZ-789">
                XYZ-789 - María López (Pintura) - $850.000
              </option>
              <option value="DEF-456">
                DEF-456 - Carlos Rodríguez (Latonería) - $350.000
              </option>
            </select>
          </div>

          <div
            class="form-group required"
            id="conceptoInput"
            style="display: none"
          >
            <label for="concepto">Concepto del Ingreso</label>
            <input
              type="text"
              id="concepto"
              name="concepto"
              placeholder="Ej: Comisión especial, Venta de accesorios"
            />
          </div>

          <div class="form-row">
            <div class="form-group required">
              <label for="monto">Monto ($)</label>
              <input
                type="number"
                id="monto"
                name="monto"
                placeholder="450000"
                required
              />
            </div>
            <div class="form-group required">
              <label for="fecha">Fecha de Pago</label>
              <input type="date" id="fecha" name="fecha" required />
            </div>
          </div>
        </div>

        <!-- MÉTODO DE PAGO -->
        <div class="section">
          <div class="section-title">Método de Pago</div>

          <div class="form-group required">
            <label>¿Cómo se recibió el pago?</label>
            <div class="radio-group">
              <div class="radio-item">
                <input
                  type="radio"
                  id="efectivo"
                  name="metodoPago"
                  value="Efectivo"
                  checked
                />
                <label for="efectivo">💵 Efectivo</label>
              </div>
              <div class="radio-item">
                <input
                  type="radio"
                  id="transferencia"
                  name="metodoPago"
                  value="Transferencia"
                />
                <label for="transferencia">🏦 Transferencia Bancaria</label>
              </div>
              <div class="radio-item">
                <input
                  type="radio"
                  id="nequi"
                  name="metodoPago"
                  value="Nequi"
                />
                <label for="nequi">📱 Nequi</label>
              </div>
              <div class="radio-item">
                <input
                  type="radio"
                  id="tarjeta"
                  name="metodoPago"
                  value="Tarjeta"
                />
                <label for="tarjeta">💳 Tarjeta</label>
              </div>
            </div>
          </div>

          <div class="form-group" id="referencia" style="display: none">
            <label for="ref">Número de Referencia</label>
            <input
              type="text"
              id="ref"
              name="ref"
              placeholder="Ej: Número de transacción, comprobante"
            />
            <div class="help-text">
              Opcional pero recomendado para auditoría
            </div>
          </div>
        </div>

        <!-- NOTAS -->
        <div class="section">
          <div class="section-title">Notas Adicionales</div>

          <div class="form-group">
            <label for="notas">Notas</label>
            <textarea
              id="notas"
              name="notas"
              placeholder="Notas sobre este ingreso..."
            ></textarea>
          </div>
        </div>

        <!-- ESPACIADOR -->
        <div style="height: 120px"></div>
      </form>

      <div class="form-actions">
        <button class="btn btn-secondary" onclick="history.back()">
          Cancelar
        </button>
        <button type="submit" form="ingresoForm" class="btn btn-primary">
          Registrar Ingreso
        </button>
      </div>
    </div>

    <script>
      // Toggle entre Trabajo y Otro Ingreso
      document
        .querySelectorAll('input[name="tipoIngreso"]')
        .forEach((input) => {
          input.addEventListener("change", function () {
            const trabajoSelect = document.getElementById("trabajoSelect");
            const conceptoInput = document.getElementById("conceptoInput");
            if (this.value === "Trabajo") {
              trabajoSelect.style.display = "block";
              conceptoInput.style.display = "none";
            } else {
              trabajoSelect.style.display = "none";
              conceptoInput.style.display = "block";
            }
          });
        });

      // Toggle referencia based on método de pago
      document.querySelectorAll('input[name="metodoPago"]').forEach((input) => {
        input.addEventListener("change", function () {
          const ref = document.getElementById("referencia");
          if (this.value !== "Efectivo") {
            ref.style.display = "block";
          } else {
            ref.style.display = "none";
          }
        });
      });

      document
        .getElementById("ingresoForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          console.log("Ingreso registrado");
        });
    </script>
  </body>
</html>
