<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - PintuMaster</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #cc0000 0%, #aa0000 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      .login-container {
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 400px;
        padding: 40px 32px;
      }

      .logo {
        text-align: center;
        margin-bottom: 32px;
      }

      .logo-text {
        font-size: 28px;
        font-weight: 700;
        color: #cc0000;
        letter-spacing: -0.5px;
      }

      .logo-subtitle {
        font-size: 12px;
        color: #999;
        margin-top: 4px;
        font-weight: 400;
      }

      h1 {
        font-size: 24px;
        font-weight: 700;
        color: #1a1a1a;
        margin-bottom: 8px;
        text-align: center;
      }

      .subtitle {
        font-size: 14px;
        color: #3d3d3d;
        text-align: center;
        margin-bottom: 32px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: #1a1a1a;
        margin-bottom: 8px;
      }

      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 16px;
        font-family: "Poppins", sans-serif;
        transition: all 0.2s ease;
      }

      input[type="email"]:focus,
      input[type="password"]:focus {
        outline: none;
        border-color: #cc0000;
        box-shadow: 0 0 0 3px rgba(204, 0, 0, 0.1);
      }

      input[type="email"]::placeholder,
      input[type="password"]::placeholder {
        color: #999;
      }

      .forgot-password {
        text-align: right;
        margin-top: 12px;
      }

      .forgot-password a {
        font-size: 12px;
        color: #cc0000;
        text-decoration: none;
        transition: color 0.2s;
      }

      .forgot-password a:hover {
        color: #aa0000;
        text-decoration: underline;
      }

      .btn-login {
        width: 100%;
        padding: 12px 24px;
        background: #cc0000;
        color: #ffffff;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 600;
        font-family: "Poppins", sans-serif;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 24px;
        min-height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .btn-login:hover {
        background: #aa0000;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(204, 0, 0, 0.3);
      }

      .btn-login:active {
        transform: translateY(0);
      }

      .error-message {
        background: #fee;
        color: #f44336;
        padding: 12px;
        border-radius: 6px;
        font-size: 14px;
        margin-bottom: 20px;
        display: none;
      }

      .error-message.show {
        display: block;
      }

      @media (max-width: 768px) {
        .login-container {
          max-width: 100%;
          padding: 32px 24px;
        }

        h1 {
          font-size: 20px;
        }

        .subtitle {
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="logo">
        <div class="logo-text">PM</div>
        <div class="logo-subtitle">PintuMaster</div>
      </div>

      <h1>Bienvenido</h1>
      <p class="subtitle">Tu taller en orden, tu dinero bajo control</p>

      <div class="error-message" id="errorMessage"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="tu@email.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
          />
          <div class="forgot-password">
            <a href="#forgot">¿Olvidaste tu contraseña?</a>
          </div>
        </div>

        <button type="submit" class="btn-login">Ingresar</button>
      </form>
    </div>

    <script>
      // Mock de login para demostración
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          if (email && password) {
            console.log("Login exitoso:", email);
            document.querySelector(".error-message").classList.remove("show");
            // Aquí iría la lógica real de login
          }
        });
    </script>
  </body>
</html>
